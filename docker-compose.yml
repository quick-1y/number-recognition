version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://anpr:anpr@postgres/anpr
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=anpr-events
      - S3_ACCESS_KEY=anpr
      - S3_SECRET_KEY=anpr_secret
      - JWT_SECRET_KEY=change-me
    depends_on:
      - postgres
      - minio
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=anpr
      - POSTGRES_USER=anpr
      - POSTGRES_PASSWORD=anpr
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: quay.io/minio/minio:RELEASE.2023-12-02T10-51-39Z
    command: server /data --console-address :9001
    environment:
      - MINIO_ROOT_USER=anpr
      - MINIO_ROOT_PASSWORD=anpr_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  minio-data:
